<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gelatino</title>
    <style>
        /* Impostazioni generali della pagina */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffe4e1; /* Colore iniziale: Rosa pastello leggero */
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
            overflow: hidden;
            position: relative;
            transition: background-color 0.8s ease; /* Transizione fluida dello sfondo */
        }

        /* Contenitore centrale stondato */
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            z-index: 10;
            max-width: 500px;
            width: 90%;
            box-sizing: border-box;
            position: relative;
        }

        /* Gestione dei passaggi */
        .step {
            display: none;
        }

        .step.active {
            display: block;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            color: #000000;
            font-size: 26px;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        /* GIF e Immagini */
        .gif-container {
            margin-bottom: 20px;
        }

        .gif-container img {
            width: 230px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* GIF di caricamento specifica senza bordi arrotondati o ombre */
        .loading-gif {
            width: 100px !important;
            border-radius: 0 !important;
            box-shadow: none !important;
        }

        /* Area e stile dei bottoni */
        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            min-height: 60px;
        }

        button {
            padding: 14px 28px; 
            font-size: 20px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.2s;
        }

        /* Bottone Continua / Sì / Ok */
        .btn-next, #btn-si {
            background-color: #4CAF50;
            color: white;
            box-shadow: 0 4px 10px rgba(76, 175, 80, 0.2);
        }

        .btn-next:hover, #btn-si:hover {
            transform: scale(1.05);
        }

        /* Bottone FORSE */
        #btn-forse {
            background-color: #ffb142; 
            color: white;
            box-shadow: 0 4px 10px rgba(255, 177, 66, 0.2);
        }

        #btn-forse:hover {
            transform: scale(1.05);
        }

        /* Bottone NO con animazione fluida */
        #btn-no {
            background-color: #ff4757;
            color: white;
            box-shadow: 0 4px 10px rgba(255, 71, 87, 0.2);
            transition: all 0.4s ease-in-out; 
            z-index: 1000;
        }

        /* Stile del Banner Scorrevole */
        .banner-scorrimento {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            box-sizing: border-box;
            background-color: rgba(0, 0, 0, 0.05);
            border-radius: 12px;
            padding: 10px 0;
            margin-top: 20px;
        }

        .testo-scorrevole {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 12s linear infinite;
            color: #000000;
            font-size: 16px;
            font-weight: bold;
        }

        @keyframes marquee {
            0%   { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        /* Stile per le emoji fluttuanti */
        .emoji {
            position: absolute;
            user-select: none;
            animation: floatUp linear forwards;
            z-index: 1;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-20vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="step-1" class="step active">
            <div class="gif-container">
                <img src="hello.gif" alt="Ciao!">
            </div>
            <h1>Ciaooooo Giuliaaa☺️</h1>
            <div class="buttons">
                <button class="btn-next" onclick="goToStep(2, '#f3e5f5')">Continua</button>
            </div>
        </div>

        <div id="step-2" class="step">
            <h1>Spero di non esser troppo molesto😔</h1>
            <div class="buttons">
                <button class="btn-next" onclick="goToStep(3, '#d4f1f9')">Continua</button>
            </div>
        </div>

        <div id="step-3" class="step">
            <div class="gif-container">
                <img src="cane.gif" alt="Golden Retriever Gelato">
            </div>
            <h1>Ti andrebbe di prendere un gelatino?🙈</h1>
            <div class="buttons" id="proposal-buttons">
                <button id="btn-si" onclick="goToStep(4, '#e8f5e9')">Si</button>
                <button id="btn-forse" onclick="goToStep('maybe', '#fff9c4')">Forse</button>
                <button id="btn-no">No</button>
            </div>
        </div>

        <div id="step-maybe" class="step">
            <div class="gif-container">
                <img src="https://media.tenor.com/On7kvXhzml4AAAAj/loading-gif.gif" alt="Caricamento..." class="loading-gif">
            </div>
            <h1>Pensaci bene... ⏳</h1>
            <div class="buttons">
                <button class="btn-next" onclick="goToStep(3, '#d4f1f9')">Ok</button>
            </div>
        </div>

        <div id="step-4" class="step">
            <div class="gif-container">
                <img src="happy.gif" alt="happpy">
            </div>
            <h1>Perfettoo🍦😋</h1>
            <div class="banner-scorrimento">
                <span class="testo-scorrevole">non essendo un eccelso informatico, scrivimi che organizziamo</span>
        </div>

    <script>
        let moveInterval; 

        // FUNZIONE PER PASSARE DA UNA PAGINA ALL'ALTRA
        function goToStep(stepNumber, bgColor) {
            const steps = document.querySelectorAll('.step');
            steps.forEach(step => step.classList.remove('active'));
            
            const nextStep = document.getElementById('step-' + stepNumber);
            if (nextStep) {
                nextStep.classList.add('active');
            }
            
            document.body.style.backgroundColor = bgColor;

            if (stepNumber === 3) {
                moveBtnNo();
                moveInterval = setInterval(moveBtnNo, 900);
            } else {
                clearInterval(moveInterval);
            }
        }

        // LOGICA DEL TASTO "NO" CHE SI MUOVE DA SOLO
        const btnNo = document.getElementById('btn-no');

        function moveBtnNo() {
            btnNo.style.position = 'fixed';
            
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            const btnWidth = btnNo.offsetWidth || 100;
            const btnHeight = btnNo.offsetHeight || 50;
            
            const randomX = Math.floor(Math.random() * (windowWidth - btnWidth - 40)) + 20;
            const randomY = Math.floor(Math.random() * (windowHeight - btnHeight - 40)) + 20;
            
            btnNo.style.left = randomX + 'px';
            btnNo.style.top = randomY + 'px';
        }

        btnNo.addEventListener('mouseover', moveBtnNo);

        btnNo.addEventListener('click', (e) => {
            e.preventDefault();
        });

        // LOGICA DELLE EMOJI FLUTTUANTI
        const emojis = ['🍦', '🐷', '😋'];
        
        function createEmoji() {
            const emojiEl = document.createElement('div');
            emojiEl.classList.add('emoji');
            emojiEl.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            
            emojiEl.style.left = Math.random() * 100 + 'vw';
            
            const duration = Math.random() * 4 + 4;
            emojiEl.style.animationDuration = duration + 's';
            
            const size = Math.random() * 20 + 25;
            emojiEl.style.fontSize = size + 'px';
            
            document.body.appendChild(emojiEl);
            
            setTimeout(() => {
                emojiEl.remove();
            }, duration * 1000);
        }

        setInterval(createEmoji, 150);
    </script>

</body>
</html>
